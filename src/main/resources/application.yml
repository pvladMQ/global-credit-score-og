spring:
  application:
    name: global-credit-engine

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis/Valkey Configuration (overridden by CF service binding)
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ Configuration (overridden by CF service binding)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  # PostgreSQL Configuration (overridden by CF service binding)
  datasource:
    url: jdbc:postgresql://localhost:5432/creditdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

# Server Configuration
server:
  port: 8080

# Actuator endpoints for CF health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Application-specific configuration
credit-engine:
  queue:
    name: application-requests

# Logging
logging:
  level:
    com.tanzu.creditengine: DEBUG
    org.springframework.amqp: INFO

---
# Cloud Foundry Profile
spring:
  config:
    activate:
      on-profile: cloud

  jpa:
    hibernate:
      ddl-auto: update
  
  # Ensure we use the 'credit-db' service by name if auto-reconfiguration logic is ambiguous
  datasource:
    url: ${vcap.services.credit-db.credentials.jdbcUrl:jdbc:postgresql://localhost:5432/creditdb}
    username: ${vcap.services.credit-db.credentials.username:postgres}
    password: ${vcap.services.credit-db.credentials.password:postgres}
